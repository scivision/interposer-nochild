(version 1)

;; Allow everything by default (blacklist mode)
(allow default)

;; === Only deny child creation ===
(deny process-exec* (with no-log))

;; Allow process creation, but only permit exec of cmake and ninja.
;; Denying process-fork blocks cmake and can lockup macOS before the child path can be checked.
(allow process-fork)

;; Explicitly allow fundamental executables to be executed.
(allow process-exec*
       (regex #"^.*/(cmake|ninja|make|sh|bash|cc|c\+\+|cc1|cc1plus|clang|clang\+\+|flang|gcc|g\+\+|gfortran|ar|ld|ranlib|as)$")
)
