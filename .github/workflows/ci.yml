name: ci

on:
  push:
    paths:
      - "**.f90"
      - "**.F90"
      - "**.c"
      - "**.cpp"
      - "**.h"
      - "**.cmake"
      - "**/CMakeLists.txt"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

# avoid wasted runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    strategy:
      matrix:
        CC: [gcc, clang]

    env:
      CC: ${{ matrix.CC }}

    steps:
    - &checkout
      uses: actions/checkout@v6

    - &test
      run: cmake --workflow default

    - &example
      run: cmake -Dopts="" -P run_sandbox.cmake

    - &upload-fail
      name: upload CMakeConfigureLog.yaml
      if: failure() && hashFiles('build/CMakeFiles/CMakeConfigureLog.yaml') != ''
      uses: actions/upload-artifact@v7
      with:
        name: ${{ runner.os }}-${{ matrix.CC }}-CMakeConfigureLog.yaml
        path: build/CMakeFiles/CMakeConfigureLog.yaml


  mac:
    runs-on: macos-latest
    timeout-minutes: 5

    strategy:
      matrix:
        CC: [gcc-15, clang]

    env:
      CC: ${{ matrix.CC }}

    steps:
    - *checkout
    - *test
    - *example
    - *upload-fail


  windows-msys:
    runs-on: windows-latest
    timeout-minutes: 5

    env:
      CC: gcc
      CXX: g++

    steps:
    - *checkout
    - *test
    - *example
    - *upload-fail


  windows-msvc:
    runs-on: windows-2025-vs2026
    timeout-minutes: 5

    steps:
    - *checkout
    - run: cmake --workflow msvc
    - *example
    - *upload-fail
